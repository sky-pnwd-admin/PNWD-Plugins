<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Fleet Log</title>
    <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #fa709a;
        }
        
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .submit-btn:hover {
            background: #38a169;
        }
        
        .submit-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .auth-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #edf2f7;
            border-radius: 8px;
            text-align: center;
        }
        
        .auth-btn {
            padding: 12px 24px;
            background: #fa709a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .auth-status {
            margin-top: 10px;
            font-size: 14px;
            color: #4a5568;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vehicle Fleet Log</h1>
        
        <div class="auth-section">
            <button id="signInBtn" class="auth-btn">Sign in with Microsoft</button>
            <div id="authStatus" class="auth-status"></div>
        </div>
        
        <form id="fleetForm">
            <div class="form-group">
                <label for="vehicleNumber">Vehicle Number</label>
                <input type="text" id="vehicleNumber" required>
            </div>
            
            <div class="form-group">
                <label for="driverName">Driver Name</label>
                <input type="text" id="driverName" required>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="tripDate">Trip Date</label>
                    <input type="date" id="tripDate" required>
                </div>
                
                <div class="form-group">
                    <label for="tripTime">Trip Time</label>
                    <input type="time" id="tripTime" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="tripType">Trip Type</label>
                <select id="tripType" required>
                    <option value="">Select...</option>
                    <option value="Delivery">Delivery</option>
                    <option value="Pickup">Pickup</option>
                    <option value="Site Visit">Site Visit</option>
                    <option value="Return">Return Trip</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="projectName">Project Name</label>
                <input type="text" id="projectName" required>
            </div>
            
            <div class="form-group">
                <label for="jobNumber">Job Number</label>
                <input type="text" id="jobNumber">
            </div>
            
            <div class="form-group">
                <label for="origin">Origin</label>
                <input type="text" id="origin" required placeholder="Starting location">
            </div>
            
            <div class="form-group">
                <label for="destination">Destination</label>
                <input type="text" id="destination" required placeholder="Ending location">
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="startMileage">Start Mileage</label>
                    <input type="number" id="startMileage" required>
                </div>
                
                <div class="form-group">
                    <label for="endMileage">End Mileage</label>
                    <input type="number" id="endMileage" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="totalMiles">Total Miles</label>
                <input type="number" id="totalMiles" readonly>
            </div>
            
            <div class="form-group">
                <label for="fuelUsed">Fuel Used (gallons)</label>
                <input type="number" id="fuelUsed" step="0.1" min="0">
            </div>
            
            <div class="form-group">
                <label for="cargoDescription">Cargo Description</label>
                <textarea id="cargoDescription"></textarea>
            </div>
            
            <div class="form-group">
                <label for="notes">Trip Notes</label>
                <textarea id="notes"></textarea>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit Fleet Log</button>
        </form>
        
        <div id="statusMessage" class="status-message"></div>
    
        <div id="debugLog" style="margin-top: 20px; padding: 10px; background: #1a202c; color: #00ff00; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 11px; max-height: 200px; overflow-y: auto;">
            <strong style="color: #fff;">Debug Log:</strong><br>
            <div id="debugContent"></div>
        </div>
    </div>

    <script>

        // Debug logging to screen
        const debugContent = document.getElementById('debugContent');
        function log(message) {
            console.log(message);
            const entry = document.createElement('div');
            entry.textContent = new Date().toLocaleTimeString() + ': ' + message;
            debugContent.appendChild(entry);
            debugContent.scrollTop = debugContent.scrollHeight;
        }
        
        log('Page loaded');

        // Microsoft Graph API Configuration
        const msalConfig = {
            auth: {
                clientId: '7c3f7932-0ace-4b08-a3da-509d90be939f',
                authority: 'https://login.microsoftonline.com/ea96ba97-cbce-4c72-b769-94e03159166a',
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: {
                cacheLocation: 'localStorage',
                storeAuthStateInCookie: true
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        const loginRequest = {
            scopes: ['Files.ReadWrite.All', 'Sites.ReadWrite.All']
        };

        // SharePoint Configuration
        const siteId = 'pnwd.sharepoint.com,0c76eba1-3ee1-4b8b-bf31-672a6c59ba3f,e816da5b-53f0-44e4-9d60-98d0e513bf22';
        const driveId = 'b!oet2DOE-i0u_MWcqbFm6P1vaFujwU-REnWCY0OUTvyKnyCrpOAv9Toj_JjY7TCMy';
        const excelFileId = '012RKNHWS67RXQDWSQCZFZFW45NSSCHCFZ';
        const tableName = 'VehicleFleet';
        const department = 'Operations';

        let accessToken = null;


        // Generate next Record_ID
        async function generateRecordID() {
            try {
                log('Fetching last Record_ID from Excel...');
                const response = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/items/${excelFileId}/workbook/tables/${tableName}/rows`,
                    {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );
                
                if (!response.ok) {
                    log('Could not fetch rows, using default: OPS-FLT-00001');
                    return 'OPS-FLT-00001';
                }
                
                const data = await response.json();
                const rows = data.value;
                
                if (rows.length === 0) {
                    log('No existing rows, starting at: OPS-FLT-00001');
                    return 'OPS-FLT-00001';
                }
                
                // Get last row's Record_ID (column 0)
                const lastRecordID = rows[rows.length - 1].values[0][0];
                log('Last Record_ID: ' + lastRecordID);
                
                if (!lastRecordID || lastRecordID === '') {
                    log('Last Record_ID empty, using: OPS-FLT-00001');
                    return 'OPS-FLT-00001';
                }
                
                // Parse the number part and increment
                const parts = lastRecordID.split('-');
                const nextNum = (parseInt(parts[2]) + 1).toString().padStart(5, '0');
                const newID = 'OPS-FLT-' + nextNum;
                log('Generated new Record_ID: ' + newID);
                return newID;
                
            } catch (error) {
                log('Error generating Record_ID: ' + error.message);
                return 'OPS-FLT-00001';
            }
        }

        // Authentication
        document.getElementById('signInBtn').addEventListener('click', async () => {
            try {
                log('Starting login...');
                const authResponse = await msalInstance.loginPopup(loginRequest);
                log('Login successful:: ' + authResponse.account.username);
                accessToken = authResponse.accessToken;
                msalInstance.setActiveAccount(authResponse.account);
                document.getElementById('authStatus').textContent = `Signed in as ${authResponse.account.username}`;
                document.getElementById('signInBtn').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
                log('Submit button enabled');
            } catch (error) {
                log('ERROR: Login failed: - ' + error);
                showStatus('Authentication failed: ' + error.message, 'error');
            }
        });

        // Initialize on page load
        (async () => {
            try {
                log('Checking for existing session...');
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    log('Found existing account:: ' + accounts[0].username);
                    msalInstance.setActiveAccount(accounts[0]);
                    const authResponse = await msalInstance.acquireTokenSilent({
                        ...loginRequest,
                        account: accounts[0]
                    });
                    accessToken = authResponse.accessToken;
                    document.getElementById('authStatus').textContent = `Signed in as ${accounts[0].username}`;
                    document.getElementById('signInBtn').style.display = 'none';
                    document.getElementById('submitBtn').disabled = false;
                    log('Auto-signin successful, submit button enabled');
                } else {
                    log('No existing session found');
                }
            } catch (error) {
                log('Silent auth failed, user needs to sign in:: ' + error.message);
            }
        })();

        // Auto-calculate total miles
        function calculateTotalMiles() {
            const start = parseFloat(document.getElementById('startMileage').value) || 0;
            const end = parseFloat(document.getElementById('endMileage').value) || 0;
            const total = end - start;
            document.getElementById('totalMiles').value = total > 0 ? total : '';
        }

        document.getElementById('startMileage').addEventListener('input', calculateTotalMiles);
        document.getElementById('endMileage').addEventListener('input', calculateTotalMiles);

        // Form submission
        document.getElementById('fleetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!accessToken) {
                showStatus('Please sign in first', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const account = msalInstance.getActiveAccount();
                if (!account) {
                    showStatus('Session expired. Please sign in again.', 'error');
                    return;
                }

                const formData = {
                    timestamp: new Date().toISOString(),
                    department: department,
                    submitter: account.name || account.username.split('@')[0],
                    submitterEmail: account.username,
                    status: 'Submitted',
                    vehicleNumber: document.getElementById('vehicleNumber').value,
                    driverName: document.getElementById('driverName').value,
                    tripDate: document.getElementById('tripDate').value,
                    tripTime: document.getElementById('tripTime').value,
                    tripType: document.getElementById('tripType').value,
                    projectName: document.getElementById('projectName').value,
                    jobNumber: document.getElementById('jobNumber').value || '',
                    origin: document.getElementById('origin').value,
                    destination: document.getElementById('destination').value,
                    startMileage: document.getElementById('startMileage').value,
                    endMileage: document.getElementById('endMileage').value,
                    totalMiles: document.getElementById('totalMiles').value,
                    fuelUsed: document.getElementById('fuelUsed').value || '0',
                    cargoDescription: document.getElementById('cargoDescription').value || '',
                    notes: document.getElementById('notes').value || ''
                };

                // Generate Record_ID
                const recordID = await generateRecordID();
                log("Using Record_ID: " + recordID);

                // Add row to Excel table
                const response = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/items/${excelFileId}/workbook/tables/${tableName}/rows`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            values: [[
                                recordID,  // Generated Record_ID - Excel formula will populate
                                formData.timestamp,
                                formData.department,
                                formData.submitter,
                                formData.submitterEmail,
                                formData.status,
                                formData.vehicleNumber,
                                formData.driverName,
                                formData.tripDate,
                                formData.tripTime,
                                formData.tripType,
                                formData.projectName,
                                formData.jobNumber,
                                formData.origin,
                                formData.destination,
                                formData.startMileage,
                                formData.endMileage,
                                formData.totalMiles,
                                formData.fuelUsed,
                                formData.cargoDescription,
                                formData.notes
                            ]]
                        })
                    }
                );

                if (!response.ok) {
                    const errorText = await response.text();
                    log('ERROR: Excel write failed: ' + response.status + ' - ' + errorText);
                    throw new Error(`Failed to write to Excel: ${response.statusText}`);
                }

                log('Excel write successful!');

                showStatus('Fleet log submitted successfully!', 'success');
                
                // Reset form
                setTimeout(() => {
                    document.getElementById('fleetForm').reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Fleet Log';
                    document.getElementById('statusMessage').style.display = 'none';
                }, 2000);

            } catch (error) {
                log('ERROR: Submission error: - ' + error);
                showStatus('Submission failed: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Fleet Log';
            }
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message ${type}`;
        }

        // Set default date and time
        document.getElementById('tripDate').valueAsDate = new Date();
        const now = new Date();
        document.getElementById('tripTime').value = now.toTimeString().slice(0, 5);
    </script>
</body>
</html>
