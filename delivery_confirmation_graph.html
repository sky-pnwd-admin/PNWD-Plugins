<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Confirmation</title>
    <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .photo-section {
            margin: 20px 0;
        }
        
        .photo-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .photo-btn {
            padding: 12px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .photo-btn:hover {
            background: #3182ce;
        }
        
        .photo-preview {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #f7fafc;
        }
        
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .photo-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #e53e3e;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .signature-section {
            margin: 20px 0;
        }
        
        #signatureCanvas {
            width: 100%;
            height: 200px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            touch-action: none;
        }
        
        .signature-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        .clear-btn {
            padding: 10px;
            background: #718096;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .submit-btn:hover {
            background: #38a169;
        }
        
        .submit-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        #cameraInput {
            display: none;
        }
        
        .auth-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #edf2f7;
            border-radius: 8px;
            text-align: center;
        }
        
        .auth-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .auth-status {
            margin-top: 10px;
            font-size: 14px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delivery Confirmation</h1>
        
        <div class="auth-section">
            <button id="signInBtn" class="auth-btn">Sign in with Microsoft</button>
            <div id="authStatus" class="auth-status"></div>
        </div>
        
        <form id="deliveryForm">
            <div class="form-group">
                <label for="projectName">Project Name</label>
                <input type="text" id="projectName" required>
            </div>
            
            <div class="form-group">
                <label for="jobNumber">Job Number</label>
                <input type="text" id="jobNumber" required>
            </div>
            
            <div class="form-group">
                <label for="deliveryDate">Delivery Date</label>
                <input type="date" id="deliveryDate" required>
            </div>
            
            <div class="form-group">
                <label for="deliveryTime">Delivery Time</label>
                <input type="time" id="deliveryTime" required>
            </div>
            
            <div class="form-group">
                <label for="recipientName">Recipient Name</label>
                <input type="text" id="recipientName" required>
            </div>
            
            <div class="form-group">
                <label for="recipientTitle">Recipient Title</label>
                <input type="text" id="recipientTitle" required>
            </div>
            
            <div class="form-group">
                <label for="deliveryLocation">Delivery Location</label>
                <input type="text" id="deliveryLocation" required>
            </div>
            
            <div class="form-group">
                <label for="materialDescription">Material Description</label>
                <textarea id="materialDescription" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="text" id="quantity" required>
            </div>
            
            <div class="form-group">
                <label for="condition">Condition on Arrival</label>
                <select id="condition" required>
                    <option value="">Select...</option>
                    <option value="Good">Good - No Damage</option>
                    <option value="Minor Damage">Minor Damage - Acceptable</option>
                    <option value="Major Damage">Major Damage - Rejected</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="notes">Additional Notes</label>
                <textarea id="notes"></textarea>
            </div>
            
            <div class="photo-section">
                <label>Delivery Photos</label>
                <div class="photo-buttons">
                    <button type="button" id="takePhotoBtn" class="photo-btn">📷 Take Photo</button>
                    <button type="button" id="uploadPhotoBtn" class="photo-btn">🖼️ Upload Photo</button>
                </div>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple>
                <div id="photoPreview" class="photo-preview"></div>
            </div>
            
            <div class="signature-section">
                <label>Recipient Signature</label>
                <canvas id="signatureCanvas"></canvas>
                <div class="signature-buttons">
                    <button type="button" id="clearSignatureBtn" class="clear-btn">Clear Signature</button>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit Confirmation</button>
        </form>
        
        <div id="statusMessage" class="status-message"></div>
        
        <div id="debugLog" style="margin-top: 20px; padding: 10px; background: #1a202c; color: #00ff00; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 11px; max-height: 200px; overflow-y: auto;">
            <strong style="color: #fff;">Debug Log:</strong><br>
            <div id="debugContent"></div>
        </div>
    </div>

    <script>
        // Debug logging to screen
        const debugContent = document.getElementById('debugContent');
        function log(message) {
            console.log(message);
            const entry = document.createElement('div');
            entry.textContent = new Date().toLocaleTimeString() + ': ' + message;
            debugContent.appendChild(entry);
            debugContent.scrollTop = debugContent.scrollHeight;
        }
        
        log('Page loaded');

        // Microsoft Graph API Configuration
        const msalConfig = {
            auth: {
                clientId: '7c3f7932-0ace-4b08-a3da-509d90be939f',
                authority: 'https://login.microsoftonline.com/ea96ba97-cbce-4c72-b769-94e03159166a',
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: {
                cacheLocation: 'localStorage',
                storeAuthStateInCookie: true
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        const loginRequest = {
            scopes: ['Files.ReadWrite.All', 'Sites.ReadWrite.All']
        };

        // SharePoint Configuration
        const siteId = 'pnwd.sharepoint.com,0c76eba1-3ee1-4b8b-bf31-672a6c59ba3f,e816da5b-53f0-44e4-9d60-98d0e513bf22';
        const driveId = 'b!oet2DOE-i0u_MWcqbFm6P1vaFujwU-REnWCY0OUTvyKnyCrpOAv9Toj_JjY7TCMy';
        const excelFileId = '012RKNHWQXLQ5GL2MFIBA3F4YDAY7XO3KB';
        const tableName = 'DeliveryConfirmations';
        const department = 'Operations';

        let accessToken = null;
        let photos = [];
        let signatureData = null;


        // Generate next Record_ID
        async function generateRecordID() {
            try {
                log('Fetching last Record_ID from Excel...');
                const response = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/items/${excelFileId}/workbook/tables/${tableName}/rows`,
                    {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );
                
                if (!response.ok) {
                    log('Could not fetch rows, using default: OPS-DLV-00001');
                    return 'OPS-DLV-00001';
                }
                
                const data = await response.json();
                const rows = data.value;
                
                if (rows.length === 0) {
                    log('No existing rows, starting at: OPS-DLV-00001');
                    return 'OPS-DLV-00001';
                }
                
                // Get last row's Record_ID (column 0)
                const lastRecordID = rows[rows.length - 1].values[0][0];
                log('Last Record_ID: ' + lastRecordID);
                
                if (!lastRecordID || lastRecordID === '') {
                    log('Last Record_ID empty, using: OPS-DLV-00001');
                    return 'OPS-DLV-00001';
                }
                
                // Parse the number part and increment
                const parts = lastRecordID.split('-');
                const nextNum = (parseInt(parts[2]) + 1).toString().padStart(5, '0');
                const newID = 'OPS-DLV-' + nextNum;
                log('Generated new Record_ID: ' + newID);
                return newID;
                
            } catch (error) {
                log('Error generating Record_ID: ' + error.message);
                return 'OPS-DLV-00001';
            }
        }

        // Authentication
        document.getElementById('signInBtn').addEventListener('click', async () => {
            try {
                log('Starting login...');
                const authResponse = await msalInstance.loginPopup(loginRequest);
                log('Login successful:: ' + authResponse.account.username);
                accessToken = authResponse.accessToken;
                msalInstance.setActiveAccount(authResponse.account);
                document.getElementById('authStatus').textContent = `Signed in as ${authResponse.account.username}`;
                document.getElementById('signInBtn').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
                log('Submit button enabled');
            } catch (error) {
                log('ERROR: Login failed: - ' + error);
                showStatus('Authentication failed: ' + error.message, 'error');
            }
        });

        // Initialize on page load
        (async () => {
            try {
                log('Checking for existing session...');
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    log('Found existing account:: ' + accounts[0].username);
                    msalInstance.setActiveAccount(accounts[0]);
                    const authResponse = await msalInstance.acquireTokenSilent({
                        ...loginRequest,
                        account: accounts[0]
                    });
                    accessToken = authResponse.accessToken;
                    document.getElementById('authStatus').textContent = `Signed in as ${accounts[0].username}`;
                    document.getElementById('signInBtn').style.display = 'none';
                    document.getElementById('submitBtn').disabled = false;
                    log('Auto-signin successful, submit button enabled');
                } else {
                    log('No existing session found');
                }
            } catch (error) {
                log('Silent auth failed, user needs to sign in:: ' + error.message);
            }
        })();

        // Signature Canvas
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            return { x, y };
        }

        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const coords = getCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
        }

        function draw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            
            const coords = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            
            lastX = coords.x;
            lastY = coords.y;
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                signatureData = canvas.toDataURL('image/png');
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        document.getElementById('clearSignatureBtn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            signatureData = null;
        });

        // Photo handling
        const cameraInput = document.getElementById('cameraInput');
        const photoPreview = document.getElementById('photoPreview');

        document.getElementById('takePhotoBtn').addEventListener('click', () => {
            cameraInput.setAttribute('capture', 'environment');
            cameraInput.click();
        });

        document.getElementById('uploadPhotoBtn').addEventListener('click', () => {
            cameraInput.removeAttribute('capture');
            cameraInput.click();
        });

        cameraInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    photos.push(event.target.result);
                    displayPhotos();
                };
                reader.readAsDataURL(file);
            });
            cameraInput.value = '';
        });

        function displayPhotos() {
            photoPreview.innerHTML = '';
            photos.forEach((photo, index) => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                photoItem.innerHTML = `
                    <img src="${photo}" alt="Delivery photo ${index + 1}">
                    <button type="button" class="photo-remove" onclick="removePhoto(${index})">×</button>
                `;
                photoPreview.appendChild(photoItem);
            });
        }

        function removePhoto(index) {
            photos.splice(index, 1);
            displayPhotos();
        }

        // Form submission
        document.getElementById('deliveryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!accessToken) {
                showStatus('Please sign in first', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const account = msalInstance.getActiveAccount();
                if (!account) {
                    showStatus('Session expired. Please sign in again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Confirmation';
                    return;
                }

                // Determine signature status
                const signatureProvided = signatureData ? 'Yes' : 'No';
                if (!signatureData) {
                    log('No signature provided - submitting without signature');
                }

                const formData = {
                    timestamp: new Date().toISOString(),
                    department: department,
                    submitter: account.name || account.username.split('@')[0],
                    submitterEmail: account.username,
                    status: 'Submitted',
                    projectName: document.getElementById('projectName').value,
                    jobNumber: document.getElementById('jobNumber').value,
                    deliveryDate: document.getElementById('deliveryDate').value,
                    deliveryTime: document.getElementById('deliveryTime').value,
                    recipientName: document.getElementById('recipientName').value,
                    recipientTitle: document.getElementById('recipientTitle').value,
                    deliveryLocation: document.getElementById('deliveryLocation').value,
                    materialDescription: document.getElementById('materialDescription').value,
                    quantity: document.getElementById('quantity').value,
                    condition: document.getElementById('condition').value,
                    notes: document.getElementById('notes').value,
                    photoCount: photos.length,
                    signatureProvided: signatureProvided
                };

                // Generate Record_ID
                const recordID = await generateRecordID();
                log("Using Record_ID: " + recordID);

                // Add row to Excel table (Record_ID is auto-generated by Excel formula in column A)
                const response = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/items/${excelFileId}/workbook/tables/${tableName}/rows`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            values: [[
                                recordID,  // Generated Record_ID - Excel formula will populate this
                                formData.timestamp,
                                formData.department,
                                formData.submitter,
                                formData.submitterEmail,
                                formData.status,
                                formData.projectName,
                                formData.jobNumber,
                                formData.deliveryDate,
                                formData.deliveryTime,
                                formData.recipientName,
                                formData.recipientTitle,
                                formData.deliveryLocation,
                                formData.materialDescription,
                                formData.quantity,
                                formData.condition,
                                formData.notes,
                                formData.photoCount,
                                formData.signatureProvided
                            ]]
                        })
                    }
                );

                if (!response.ok) {
                    throw new Error(`Failed to write to Excel: ${response.statusText}`);
                }

                showStatus('Delivery confirmation submitted successfully!', 'success');
                
                // Reset form
                setTimeout(() => {
                    document.getElementById('deliveryForm').reset();
                    photos = [];
                    signatureData = null;
                    displayPhotos();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Confirmation';
                    document.getElementById('statusMessage').style.display = 'none';
                }, 2000);

            } catch (error) {
                log('ERROR: Submission error: - ' + error);
                showStatus('Submission failed: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Confirmation';
            }
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message ${type}`;
        }

        // Set default date and time
        document.getElementById('deliveryDate').valueAsDate = new Date();
        const now = new Date();
        document.getElementById('deliveryTime').value = now.toTimeString().slice(0, 5);
    </script>
</body>
</html>
