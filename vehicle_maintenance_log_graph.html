create_file({
  path: "/home/claude/vehicle_maintenance_log_graph.html",
  description: "Maintenance log plugin with Graph API authentication and direct SharePoint Excel writes",
  file_text: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Maintenance Log</title>
    <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .status.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .status.loading {
            background: #bee3f8;
            color: #2c5282;
            display: block;
        }
        
        .auth-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .auth-status.authenticated {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .auth-status.unauthenticated {
            background: #feebc8;
            color: #7c2d12;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Vehicle Maintenance Log</h1>
        
        <div id="authStatus" class="auth-status unauthenticated">
            Authenticating...
        </div>
        
        <form id="maintenanceForm">
            <div class="form-group">
                <label for="vehicleId">Vehicle ID *</label>
                <input type="text" id="vehicleId" required placeholder="e.g., PNWD-F450">
            </div>
            
            <div class="form-group">
                <label for="serviceType">Service Type *</label>
                <select id="serviceType" required>
                    <option value="">Select service type...</option>
                    <option value="oil-change">Oil Change (every 5,000 mi / 90 days)</option>
                    <option value="tire-rotation">Tire Rotation (every 10,000 mi / 6 months)</option>
                    <option value="brake-inspection">Brake Inspection (every 15,000 mi / 12 months)</option>
                    <option value="transmission-service">Transmission Service (every 30,000 mi / 24 months)</option>
                    <option value="coolant-flush">Coolant Flush (every 30,000 mi / 24 months)</option>
                    <option value="air-filter">Air Filter Replacement</option>
                    <option value="battery-replacement">Battery Replacement</option>
                    <option value="inspection">Annual Safety Inspection</option>
                    <option value="repair">Repair (specify in notes)</option>
                    <option value="other">Other (specify in notes)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="serviceProvider">Service Provider *</label>
                <input type="text" id="serviceProvider" required placeholder="e.g., Jiffy Lube, Les Schwab">
            </div>
            
            <div class="form-group">
                <label for="serviceDate">Service Date *</label>
                <input type="date" id="serviceDate" required>
            </div>
            
            <div class="form-group">
                <label for="mileage">Mileage at Service *</label>
                <input type="number" id="mileage" required placeholder="e.g., 48250">
            </div>
            
            <div class="form-group">
                <label for="cost">Cost ($)</label>
                <input type="number" id="cost" step="0.01" placeholder="e.g., 89.99">
            </div>
            
            <div class="form-group">
                <label for="nextServiceDate">Next Service Date</label>
                <input type="date" id="nextServiceDate">
            </div>
            
            <div class="form-group">
                <label for="nextServiceMileage">Next Service Mileage</label>
                <input type="number" id="nextServiceMileage" placeholder="e.g., 53250">
            </div>
            
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" placeholder="Additional details about the service..."></textarea>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Submit Maintenance Log</button>
        </form>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // Configuration
        const msalConfig = {
            auth: {
                clientId: '7c3f7932-0ace-4b08-a3da-509d90be939f',
                authority: 'https://login.microsoftonline.com/ea96ba97-cbce-4c72-b769-94e03159166a',
                redirectUri: window.location.origin
            },
            cache: {
                cacheLocation: 'localStorage',
                storeAuthStateInCookie: false
            }
        };

        const loginRequest = {
            scopes: ['Files.ReadWrite.All', 'Sites.ReadWrite.All']
        };

        const siteId = 'pnwd.sharepoint.com,0c76eba1-3ee1-4b8b-bf31-672a6c59ba3f,e816da5b-53f0-44e4-9d60-98d0e513bf22';
        const operationsDriveId = 'b!oet2DOE-i0u_MWcqbFm6P1vaFujwU-REnWCY0OUTvyKnyCrpOAv9Toj_JjY7TCMy';
        const reportsDriveId = 'b!oet2DOE-i0u_MWcqbFm6P1vaFujwU-REnWCY0OUTvyLbOJ1KSkAYT7SN5A8cx6l4';

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let accessToken = null;

        // Service type labels
        const serviceLabels = {
            'oil-change': 'Oil Change (every 5,000 mi / 90 days)',
            'tire-rotation': 'Tire Rotation (every 10,000 mi / 6 months)',
            'brake-inspection': 'Brake Inspection (every 15,000 mi / 12 months)',
            'transmission-service': 'Transmission Service (every 30,000 mi / 24 months)',
            'coolant-flush': 'Coolant Flush (every 30,000 mi / 24 months)',
            'air-filter': 'Air Filter Replacement',
            'battery-replacement': 'Battery Replacement',
            'inspection': 'Annual Safety Inspection',
            'repair': 'Repair',
            'other': 'Other'
        };

        // Initialize authentication
        async function initialize() {
            try {
                await msalInstance.initialize();
                const accounts = msalInstance.getAllAccounts();
                
                if (accounts.length > 0) {
                    msalInstance.setActiveAccount(accounts[0]);
                    await getToken();
                } else {
                    await login();
                }
            } catch (error) {
                console.error('Initialization error:', error);
                showStatus('Authentication failed. Please refresh the page.', 'error');
            }
        }

        async function login() {
            try {
                const response = await msalInstance.loginPopup(loginRequest);
                msalInstance.setActiveAccount(response.account);
                await getToken();
            } catch (error) {
                console.error('Login error:', error);
                showStatus('Login failed. Please try again.', 'error');
            }
        }

        async function getToken() {
            try {
                const account = msalInstance.getActiveAccount();
                if (!account) {
                    await login();
                    return;
                }

                const response = await msalInstance.acquireTokenSilent({
                    ...loginRequest,
                    account: account
                });
                
                accessToken = response.accessToken;
                updateAuthStatus(account.username);
            } catch (error) {
                if (error instanceof msal.InteractionRequiredAuthError) {
                    await msalInstance.acquireTokenPopup(loginRequest);
                } else {
                    console.error('Token acquisition error:', error);
                }
            }
        }

        function updateAuthStatus(username) {
            const authStatus = document.getElementById('authStatus');
            authStatus.className = 'auth-status authenticated';
            authStatus.textContent = \`✓ Authenticated as \${username}\`;
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = \`status \${type}\`;
            
            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }

        function generateRecordID() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = 'ML-';
            result += new Date().toISOString().slice(0,10).replace(/-/g, '');
            result += '-';
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function writeToExcel(driveId, fileName, tableName, rowData) {
            const url = \`https://graph.microsoft.com/v1.0/drives/\${driveId}/root:/\${fileName}:/workbook/tables/\${tableName}/rows\`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': \`Bearer \${accessToken}\`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    values: [rowData]
                })
            });

            if (!response.ok) {
                const error = await response.text();
                throw new Error(\`Excel write failed: \${error}\`);
            }

            return await response.json();
        }

        document.getElementById('maintenanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            showStatus('Submitting maintenance log...', 'loading');

            try {
                if (!accessToken) {
                    await getToken();
                }

                const recordID = generateRecordID();
                const timestamp = new Date().toISOString();
                const vehicleId = document.getElementById('vehicleId').value;
                const serviceType = document.getElementById('serviceType').value;
                const serviceProvider = document.getElementById('serviceProvider').value;
                const serviceDate = document.getElementById('serviceDate').value;
                const mileage = parseInt(document.getElementById('mileage').value);
                const cost = parseFloat(document.getElementById('cost').value) || 0;
                const nextServiceDate = document.getElementById('nextServiceDate').value || '';
                const nextServiceMileage = parseInt(document.getElementById('nextServiceMileage').value) || 0;
                const notes = document.getElementById('notes').value;
                const submitter = msalInstance.getActiveAccount().username;

                const nextServiceDisplay = nextServiceMileage && nextServiceDate 
                    ? \`\${nextServiceMileage.toLocaleString()} mi or \${new Date(nextServiceDate).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'})}\`
                    : '';

                // Maintenance Log row (18 columns)
                const maintenanceRow = [
                    recordID,                                    // Record_ID
                    timestamp,                                   // Timestamp
                    'VehicleMaintenanceLog',                    // Form_Type
                    'Operations',                                // Department
                    vehicleId,                                   // Vehicle_ID
                    serviceType,                                 // Service_Type
                    serviceProvider,                             // Service_Provider
                    serviceDate,                                 // Service_Date
                    mileage,                                     // Mileage_At_Service
                    cost,                                        // Cost
                    nextServiceDate,                             // Next_Service_Date
                    nextServiceMileage,                          // Next_Service_Mileage
                    nextServiceDisplay,                          // Next_Service_Display
                    notes,                                       // Notes
                    submitter,                                   // Submitter
                    'Submitted',                                 // Status
                    'https://pnwd.sharepoint.com/sites/PNWD',   // SharePoint_Site
                    'OPS-003-Vehicles/002-maintenance_log'      // SharePoint_Folder
                ];

                // Master Log row (18 columns)
                const masterLogRow = [
                    \`FORM-\${Date.now()}\`,                      // FormID
                    'VehicleMaintenanceLog',                    // FormType
                    timestamp,                                   // SubmissionDateTime
                    'Operations',                                // Department
                    submitter,                                   // SubmittedBy
                    submitter,                                   // SubmitterEmail
                    'Submitted',                                 // Status
                    'Fleet',                                     // RelatedProject
                    '',                                          // OutputFileURL
                    '',                                          // OutputFileName
                    'Operations',                                // SharePointLibrary
                    'No',                                        // ApprovalRequired
                    '',                                          // ApprovedBy
                    '',                                          // ApprovalDateTime
                    '',                                          // Notes
                    timestamp,                                   // LastModified
                    recordID,                                    // PluginRecordID
                    \`\${serviceLabels[serviceType]} — \${vehicleId}\` // Summary
                ];

                // Write to Maintenance Log
                await writeToExcel(
                    operationsDriveId,
                    'PNWD_Vehicle_Maintenance_Log.xlsx',
                    'MaintenanceLog',
                    maintenanceRow
                );

                // Write to Master Log
                await writeToExcel(
                    reportsDriveId,
                    'PNWD_Master_Form_Log.xlsx',
                    'Form_Submissions_Log',
                    masterLogRow
                );

                showStatus('✓ Maintenance log submitted successfully!', 'success');
                document.getElementById('maintenanceForm').reset();

            } catch (error) {
                console.error('Submission error:', error);
                showStatus(\`Error: \${error.message}\`, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Set today's date as default
        document.getElementById('serviceDate').valueAsDate = new Date();

        // Initialize on load
        initialize();
    </script>
</body>
</html>`
})
