<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Maintenance Log</title>
    <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #f5576c;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .submit-btn:hover {
            background: #38a169;
        }
        
        .submit-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .auth-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #edf2f7;
            border-radius: 8px;
            text-align: center;
        }
        
        .auth-btn {
            padding: 12px 24px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .auth-status {
            margin-top: 10px;
            font-size: 14px;
            color: #4a5568;
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vehicle Maintenance Log</h1>
        
        <div class="auth-section">
            <button id="signInBtn" class="auth-btn">Sign in with Microsoft</button>
            <div id="authStatus" class="auth-status"></div>
        </div>
        
        <form id="maintenanceForm">
            <div class="form-group">
                <label for="vehicleNumber">Vehicle Number</label>
                <input type="text" id="vehicleNumber" required>
            </div>
            
            <div class="form-group">
                <label for="vehicleType">Vehicle Type</label>
                <select id="vehicleType" required>
                    <option value="">Select...</option>
                    <option value="Truck">Truck</option>
                    <option value="Van">Van</option>
                    <option value="Forklift">Forklift</option>
                    <option value="Trailer">Trailer</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="maintenanceDate">Maintenance Date</label>
                <input type="date" id="maintenanceDate" required>
            </div>
            
            <div class="form-group">
                <label for="currentMileage">Current Mileage</label>
                <input type="number" id="currentMileage" required>
            </div>
            
            <div class="form-group">
                <label for="maintenanceType">Maintenance Type</label>
                <select id="maintenanceType" required>
                    <option value="">Select...</option>
                    <option value="Scheduled">Scheduled Service</option>
                    <option value="Repair">Repair</option>
                    <option value="Emergency">Emergency</option>
                    <option value="Inspection">Inspection</option>
                    <option value="PM">Preventive Maintenance</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Services Performed</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="oilChange" value="Oil Change">
                        <label for="oilChange">Oil Change</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tireRotation" value="Tire Rotation">
                        <label for="tireRotation">Tire Rotation</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="brakeService" value="Brake Service">
                        <label for="brakeService">Brake Service</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="batteryCheck" value="Battery Check">
                        <label for="batteryCheck">Battery Check</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="fluidCheck" value="Fluid Check">
                        <label for="fluidCheck">Fluid Check</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="filterReplacement" value="Filter Replacement">
                        <label for="filterReplacement">Filter Replacement</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="performedBy">Performed By</label>
                <input type="text" id="performedBy" required>
            </div>
            
            <div class="form-group">
                <label for="vendor">Vendor/Shop</label>
                <input type="text" id="vendor">
            </div>
            
            <div class="form-group">
                <label for="cost">Cost ($)</label>
                <input type="number" id="cost" step="0.01" min="0">
            </div>
            
            <div class="form-group">
                <label for="description">Description/Notes</label>
                <textarea id="description" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="nextServiceDue">Next Service Due (Mileage)</label>
                <input type="number" id="nextServiceDue">
            </div>
            
            <div class="form-group">
                <label for="nextServiceDate">Next Service Date</label>
                <input type="date" id="nextServiceDate">
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit Maintenance Log</button>
        </form>
        
        <div id="statusMessage" class="status-message"></div>
    
        <div id="debugLog" style="margin-top: 20px; padding: 10px; background: #1a202c; color: #00ff00; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 11px; max-height: 200px; overflow-y: auto;">
            <strong style="color: #fff;">Debug Log:</strong><br>
            <div id="debugContent"></div>
        </div>
    </div>

    <script>

        // Debug logging to screen
        const debugContent = document.getElementById('debugContent');
        function log(message) {
            console.log(message);
            const entry = document.createElement('div');
            entry.textContent = new Date().toLocaleTimeString() + ': ' + message;
            debugContent.appendChild(entry);
            debugContent.scrollTop = debugContent.scrollHeight;
        }
        
        log('Page loaded');

        // Microsoft Graph API Configuration
        const msalConfig = {
            auth: {
                clientId: '7c3f7932-0ace-4b08-a3da-509d90be939f',
                authority: 'https://login.microsoftonline.com/ea96ba97-cbce-4c72-b769-94e03159166a',
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: {
                cacheLocation: 'localStorage',
                storeAuthStateInCookie: true
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        const loginRequest = {
            scopes: ['Files.ReadWrite.All', 'Sites.ReadWrite.All']
        };

        // SharePoint Configuration
        const siteId = 'pnwd.sharepoint.com,0c76eba1-3ee1-4b8b-bf31-672a6c59ba3f,e816da5b-53f0-44e4-9d60-98d0e513bf22';
        const driveId = 'b!oet2DOE-i0u_MWcqbFm6P1vaFujwU-REnWCY0OUTvyKnyCrpOAv9Toj_JjY7TCMy';
        const excelFileId = '012RKNHWWZUQAERJPWHJDJLSRV5DMZYXD3';
        const tableName = 'VehicleMaintenance';
        const department = 'Operations';

        let accessToken = null;


        // Generate next Record_ID
        async function generateRecordID() {
            try {
                log('Fetching last Record_ID from Excel...');
                const response = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/items/${excelFileId}/workbook/tables/${tableName}/rows`,
                    {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );
                
                if (!response.ok) {
                    log('Could not fetch rows, using default: OPS-MTN-00001');
                    return 'OPS-MTN-00001';
                }
                
                const data = await response.json();
                const rows = data.value;
                
                if (rows.length === 0) {
                    log('No existing rows, starting at: OPS-MTN-00001');
                    return 'OPS-MTN-00001';
                }
                
                // Get last row's Record_ID (column 0)
                const lastRecordID = rows[rows.length - 1].values[0][0];
                log('Last Record_ID: ' + lastRecordID);
                
                if (!lastRecordID || lastRecordID === '') {
                    log('Last Record_ID empty, using: OPS-MTN-00001');
                    return 'OPS-MTN-00001';
                }
                
                // Parse the number part and increment
                const parts = lastRecordID.split('-');
                const nextNum = (parseInt(parts[2]) + 1).toString().padStart(5, '0');
                const newID = 'OPS-MTN-' + nextNum;
                log('Generated new Record_ID: ' + newID);
                return newID;
                
            } catch (error) {
                log('Error generating Record_ID: ' + error.message);
                return 'OPS-MTN-00001';
            }
        }

        // Authentication
        document.getElementById('signInBtn').addEventListener('click', async () => {
            try {
                log('Starting login...');
                const authResponse = await msalInstance.loginPopup(loginRequest);
                log('Login successful:: ' + authResponse.account.username);
                accessToken = authResponse.accessToken;
                msalInstance.setActiveAccount(authResponse.account);
                document.getElementById('authStatus').textContent = `Signed in as ${authResponse.account.username}`;
                document.getElementById('signInBtn').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
                log('Submit button enabled');
            } catch (error) {
                log('ERROR: Login failed: - ' + error);
                showStatus('Authentication failed: ' + error.message, 'error');
            }
        });

        // Initialize on page load
        (async () => {
            try {
                log('Checking for existing session...');
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    log('Found existing account:: ' + accounts[0].username);
                    msalInstance.setActiveAccount(accounts[0]);
                    const authResponse = await msalInstance.acquireTokenSilent({
                        ...loginRequest,
                        account: accounts[0]
                    });
                    accessToken = authResponse.accessToken;
                    document.getElementById('authStatus').textContent = `Signed in as ${accounts[0].username}`;
                    document.getElementById('signInBtn').style.display = 'none';
                    document.getElementById('submitBtn').disabled = false;
                    log('Auto-signin successful, submit button enabled');
                } else {
                    log('No existing session found');
                }
            } catch (error) {
                log('Silent auth failed, user needs to sign in:: ' + error.message);
            }
        })();

        // Form submission
        document.getElementById('maintenanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!accessToken) {
                showStatus('Please sign in first', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const account = msalInstance.getActiveAccount();
                if (!account) {
                    showStatus('Session expired. Please sign in again.', 'error');
                    return;
                }

                // Collect checked services
                const services = [];
                document.querySelectorAll('.checkbox-item input[type="checkbox"]:checked').forEach(cb => {
                    services.push(cb.value);
                });

                const formData = {
                    timestamp: new Date().toISOString(),
                    department: department,
                    submitter: account.name || account.username.split('@')[0],
                    submitterEmail: account.username,
                    status: 'Submitted',
                    vehicleNumber: document.getElementById('vehicleNumber').value,
                    vehicleType: document.getElementById('vehicleType').value,
                    maintenanceDate: document.getElementById('maintenanceDate').value,
                    currentMileage: document.getElementById('currentMileage').value,
                    maintenanceType: document.getElementById('maintenanceType').value,
                    servicesPerformed: services.join(', '),
                    performedBy: document.getElementById('performedBy').value,
                    vendor: document.getElementById('vendor').value || '',
                    cost: document.getElementById('cost').value || '0',
                    description: document.getElementById('description').value,
                    nextServiceDue: document.getElementById('nextServiceDue').value || '',
                    nextServiceDate: document.getElementById('nextServiceDate').value || ''
                };

                // Generate Record_ID
                const recordID = await generateRecordID();
                log("Using Record_ID: " + recordID);

                // Add row to Excel table
                const response = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/items/${excelFileId}/workbook/tables/${tableName}/rows`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            values: [[
                                recordID,  // Generated Record_ID - Excel formula will populate
                                formData.timestamp,
                                formData.department,
                                formData.submitter,
                                formData.submitterEmail,
                                formData.status,
                                formData.vehicleNumber,
                                formData.vehicleType,
                                formData.maintenanceDate,
                                formData.currentMileage,
                                formData.maintenanceType,
                                formData.servicesPerformed,
                                formData.performedBy,
                                formData.vendor,
                                formData.cost,
                                formData.description,
                                formData.nextServiceDue,
                                formData.nextServiceDate
                            ]]
                        })
                    }
                );

                if (!response.ok) {
                    throw new Error(`Failed to write to Excel: ${response.statusText}`);
                }

                showStatus('Maintenance log submitted successfully!', 'success');
                
                // Reset form
                setTimeout(() => {
                    document.getElementById('maintenanceForm').reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Maintenance Log';
                    document.getElementById('statusMessage').style.display = 'none';
                }, 2000);

            } catch (error) {
                log('ERROR: Submission error: - ' + error);
                showStatus('Submission failed: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Maintenance Log';
            }
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message ${type}`;
        }

        // Set default date
        document.getElementById('maintenanceDate').valueAsDate = new Date();
    </script>
</body>
</html>
