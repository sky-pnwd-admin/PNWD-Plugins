create_file({

  description: "Fleet log plugin with Graph API authentication and direct SharePoint Excel writes",
  file_text: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Fleet Log</title>
    <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn-checkout {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }
        
        .btn-checkin {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .status.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .status.loading {
            background: #bee3f8;
            color: #2c5282;
            display: block;
        }
        
        .auth-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .auth-status.authenticated {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .auth-status.unauthenticated {
            background: #feebc8;
            color: #7c2d12;
        }
        
        .checkin-fields {
            display: none;
        }
        
        .checkin-fields.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Vehicle Fleet Log</h1>
        
        <div id="authStatus" class="auth-status unauthenticated">
            Authenticating...
        </div>
        
        <form id="fleetForm">
            <div class="form-group">
                <label for="entryType">Entry Type *</label>
                <select id="entryType" required>
                    <option value="checkout">Check-Out</option>
                    <option value="checkin">Check-In</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="vehicleId">Vehicle ID *</label>
                <input type="text" id="vehicleId" required placeholder="e.g., PNWD-F450">
            </div>
            
            <div class="form-group">
                <label for="employee">Employee Name *</label>
                <input type="text" id="employee" required placeholder="e.g., Danny (Expediter)">
            </div>
            
            <div class="form-group">
                <label for="logDate">Date *</label>
                <input type="date" id="logDate" required>
            </div>
            
            <div class="form-group">
                <label for="logTime">Time *</label>
                <input type="time" id="logTime" required>
            </div>
            
            <div class="form-group">
                <label for="odometerStart">Odometer Reading *</label>
                <input type="number" id="odometerStart" required placeholder="e.g., 48250">
            </div>
            
            <div class="form-group checkin-fields" id="checkinFields">
                <label for="odometerReturn">Return Odometer Reading</label>
                <input type="number" id="odometerReturn" placeholder="e.g., 48280">
            </div>
            
            <div class="form-group">
                <label for="purpose">Purpose *</label>
                <input type="text" id="purpose" required placeholder="e.g., Material Pickup — Job Site Delivery">
            </div>
            
            <div class="form-group">
                <label for="projectRef">Project Reference</label>
                <input type="text" id="projectRef" placeholder="e.g., Arhaus">
            </div>
            
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" placeholder="Additional details..."></textarea>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Submit Fleet Log</button>
        </form>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // Configuration
        const msalConfig = {
            auth: {
                clientId: '7c3f7932-0ace-4b08-a3da-509d90be939f',
                authority: 'https://login.microsoftonline.com/ea96ba97-cbce-4c72-b769-94e03159166a',
                redirectUri: window.location.origin
            },
            cache: {
                cacheLocation: 'localStorage',
                storeAuthStateInCookie: false
            }
        };

        const loginRequest = {
            scopes: ['Files.ReadWrite.All', 'Sites.ReadWrite.All']
        };

        const siteId = 'pnwd.sharepoint.com,0c76eba1-3ee1-4b8b-bf31-672a6c59ba3f,e816da5b-53f0-44e4-9d60-98d0e513bf22';
        const operationsDriveId = 'b!oet2DOE-i0u_MWcqbFm6P1vaFujwU-REnWCY0OUTvyKnyCrpOAv9Toj_JjY7TCMy';
        const reportsDriveId = 'b!oet2DOE-i0u_MWcqbFm6P1vaFujwU-REnWCY0OUTvyLbOJ1KSkAYT7SN5A8cx6l4';

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let accessToken = null;

        // Initialize authentication
        async function initialize() {
            try {
                await msalInstance.initialize();
                const accounts = msalInstance.getAllAccounts();
                
                if (accounts.length > 0) {
                    msalInstance.setActiveAccount(accounts[0]);
                    await getToken();
                } else {
                    await login();
                }
            } catch (error) {
                console.error('Initialization error:', error);
                showStatus('Authentication failed. Please refresh the page.', 'error');
            }
        }

        async function login() {
            try {
                const response = await msalInstance.loginPopup(loginRequest);
                msalInstance.setActiveAccount(response.account);
                await getToken();
            } catch (error) {
                console.error('Login error:', error);
                showStatus('Login failed. Please try again.', 'error');
            }
        }

        async function getToken() {
            try {
                const account = msalInstance.getActiveAccount();
                if (!account) {
                    await login();
                    return;
                }

                const response = await msalInstance.acquireTokenSilent({
                    ...loginRequest,
                    account: account
                });
                
                accessToken = response.accessToken;
                updateAuthStatus(account.username);
            } catch (error) {
                if (error instanceof msal.InteractionRequiredAuthError) {
                    await msalInstance.acquireTokenPopup(loginRequest);
                } else {
                    console.error('Token acquisition error:', error);
                }
            }
        }

        function updateAuthStatus(username) {
            const authStatus = document.getElementById('authStatus');
            authStatus.className = 'auth-status authenticated';
            authStatus.textContent = \`✓ Authenticated as \${username}\`;
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = \`status \${type}\`;
            
            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }

        function generateRecordID() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = 'VL-';
            result += new Date().toISOString().slice(0,10).replace(/-/g, '');
            result += '-';
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function writeToExcel(driveId, fileName, tableName, rowData) {
            const url = \`https://graph.microsoft.com/v1.0/drives/\${driveId}/root:/\${fileName}:/workbook/tables/\${tableName}/rows\`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': \`Bearer \${accessToken}\`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    values: [rowData]
                })
            });

            if (!response.ok) {
                const error = await response.text();
                throw new Error(\`Excel write failed: \${error}\`);
            }

            return await response.json();
        }

        // Toggle check-in fields
        document.getElementById('entryType').addEventListener('change', (e) => {
            const checkinFields = document.getElementById('checkinFields');
            if (e.target.value === 'checkin') {
                checkinFields.classList.add('active');
                document.getElementById('odometerReturn').required = true;
            } else {
                checkinFields.classList.remove('active');
                document.getElementById('odometerReturn').required = false;
            }
        });

        document.getElementById('fleetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            showStatus('Submitting fleet log...', 'loading');

            try {
                if (!accessToken) {
                    await getToken();
                }

                const recordID = generateRecordID();
                const timestamp = new Date().toISOString();
                const entryType = document.getElementById('entryType').value;
                const employee = document.getElementById('employee').value;
                const vehicleId = document.getElementById('vehicleId').value;
                const logDate = document.getElementById('logDate').value;
                const logTime = document.getElementById('logTime').value;
                const odometerStart = parseInt(document.getElementById('odometerStart').value);
                const odometerReturn = document.getElementById('odometerReturn').value 
                    ? parseInt(document.getElementById('odometerReturn').value) 
                    : null;
                const milesDriven = odometerReturn ? odometerReturn - odometerStart : null;
                const purpose = document.getElementById('purpose').value;
                const projectRef = document.getElementById('projectRef').value;
                const notes = document.getElementById('notes').value;
                const submitter = msalInstance.getActiveAccount().username;

                // Fleet Log row (19 columns)
                const fleetRow = [
                    recordID,                                    // Record_ID
                    timestamp,                                   // Timestamp
                    'VehicleFleetLog',                          // Form_Type
                    'Operations',                                // Department
                    entryType,                                   // Entry_Type
                    employee,                                    // Employee
                    vehicleId,                                   // Vehicle_ID
                    logDate,                                     // Log_Date
                    logTime,                                     // Log_Time
                    odometerStart,                               // Odometer_Start
                    odometerReturn || '',                        // Odometer_Return
                    milesDriven || '',                           // Miles_Driven
                    purpose,                                     // Purpose
                    projectRef,                                  // Project_Ref
                    notes,                                       // Notes
                    submitter,                                   // Submitter
                    'Submitted',                                 // Status
                    'https://pnwd.sharepoint.com/sites/PNWD',   // SharePoint_Site
                    'OPS-003-Vehicles/001-vehicle_log'          // SharePoint_Folder
                ];

                // Master Log row (18 columns)
                const masterLogRow = [
                    \`FORM-\${Date.now()}\`,                      // FormID
                    'VehicleFleetLog',                          // FormType
                    timestamp,                                   // SubmissionDateTime
                    'Operations',                                // Department
                    submitter,                                   // SubmittedBy
                    submitter,                                   // SubmitterEmail
                    'Submitted',                                 // Status
                    projectRef || 'Fleet',                       // RelatedProject
                    '',                                          // OutputFileURL
                    '',                                          // OutputFileName
                    'Operations',                                // SharePointLibrary
                    'No',                                        // ApprovalRequired
                    '',                                          // ApprovedBy
                    '',                                          // ApprovalDateTime
                    '',                                          // Notes
                    timestamp,                                   // LastModified
                    recordID,                                    // PluginRecordID
                    \`\${entryType === 'checkout' ? 'Check-out' : 'Check-in'}: \${vehicleId} — \${employee}\` // Summary
                ];

                // Write to Fleet Log
                await writeToExcel(
                    operationsDriveId,
                    'PNWD_Fleet_Management_Log.xlsx',
                    'FleetLog',
                    fleetRow
                );

                // Write to Master Log
                await writeToExcel(
                    reportsDriveId,
                    'PNWD_Master_Form_Log.xlsx',
                    'Form_Submissions_Log',
                    masterLogRow
                );

                showStatus('✓ Fleet log submitted successfully!', 'success');
                document.getElementById('fleetForm').reset();

            } catch (error) {
                console.error('Submission error:', error);
                showStatus(\`Error: \${error.message}\`, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Set today's date and current time as defaults
        const now = new Date();
        document.getElementById('logDate').valueAsDate = now;
        document.getElementById('logTime').value = now.toTimeString().slice(0,5);

        // Initialize on load
        initialize();
    </script>
</body>
</html>`
})
